name: Build and deploy Drift

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild when the substrate changes. Set up via Corpus-Perspectival's
  # workflows/dispatch when/if we want push-triggered re-syncs.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Sync from substrate
        run: bash scripts/sync-from-substrate.sh
        env:
          SUBSTRATE_REPO: https://github.com/Multi-DAC/Corpus-Perspectival.git
          SUBSTRATE_REF: main

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
